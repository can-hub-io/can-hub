name: release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: create release with generated notes
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true

  static-assets:
    needs: create-release
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [armv7, arm64, x86_64]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: static build (binaries + zero-dep debs)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/static.Dockerfile
          build-args: ARCH=${{ matrix.arch }}
          outputs: type=local,dest=dist/${{ matrix.arch }}
          cache-from: type=gha,scope=static-${{ matrix.arch }}
          cache-to: type=gha,scope=static-${{ matrix.arch }},mode=max
      - name: verify static linkage
        run: |
          file dist/${{ matrix.arch }}/can-hub | grep -q "statically linked"
          file dist/${{ matrix.arch }}/can-hub-agent | grep -q "statically linked"
          file dist/${{ matrix.arch }}/can-hub-client | grep -q "statically linked"
          file dist/${{ matrix.arch }}/can-hub-cli | grep -q "statically linked"
      - name: pack tarball
        run: |
          cd dist/${{ matrix.arch }}
          tar czf ../can-hub-${{ github.ref_name }}-linux-${{ matrix.arch }}-static.tar.gz \
              can-hub can-hub-agent can-hub-client can-hub-cli
      - name: publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/can-hub-${{ github.ref_name }}-linux-${{ matrix.arch }}-static.tar.gz
            dist/${{ matrix.arch }}/*.deb

  python-wheels:
    needs: create-release
    # Each arch builds on its native arm64/x86 runner instead of x86 + QEMU,
    # which kept the emulated OpenSSL build under 30 min. The armv7l container
    # runs on the arm64 host where uname reports aarch64; build-python-wheel.sh
    # forces CMAKE_SYSTEM_PROCESSOR=armv7l so OpenSSL configures linux-armv4
    # (32-bit asm) to match the 32-bit toolchain.
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-latest
          - arch: aarch64
            runner: ubuntu-24.04-arm
          - arch: armv7l
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - name: build manylinux wheel
        run: ./scripts/build-python-wheel.sh ${{ matrix.arch }}
      - uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.arch }}
          path: python/dist/${{ matrix.arch }}/*.whl
      - name: publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: python/dist/${{ matrix.arch }}/*.whl

  python-wheel-windows:
    needs: create-release
    runs-on: ubuntu-latest
    env:
      LLVM_MINGW_VERSION: "20260602"
      LLVM_MINGW_SHA256: 9d191203f9768ead60662d3ae53cdf28e0a28b1e6d44b7f329b9202cb2add337
    steps:
      - uses: actions/checkout@v4
      - name: install dependencies
        run: sudo apt-get update && sudo apt-get install -y ninja-build perl
      - name: install llvm-mingw
        run: |
          curl -fsSL -o /tmp/llvm-mingw.tar.xz "https://github.com/mstorsjo/llvm-mingw/releases/download/$LLVM_MINGW_VERSION/llvm-mingw-$LLVM_MINGW_VERSION-ucrt-ubuntu-22.04-x86_64.tar.xz"
          echo "$LLVM_MINGW_SHA256  /tmp/llvm-mingw.tar.xz" | sha256sum -c
          mkdir -p "$HOME/llvm-mingw"
          tar -xf /tmp/llvm-mingw.tar.xz --strip-components=1 -C "$HOME/llvm-mingw"
      - name: build win_amd64 wheel
        run: PATH="$HOME/llvm-mingw/bin:$PATH" ./scripts/build-python-wheel-windows.sh
      - uses: actions/upload-artifact@v4
        with:
          name: wheel-win_amd64
          path: python/dist/*.whl
      - name: publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: python/dist/*.whl

  pypi-publish:
    needs: [python-wheels, python-wheel-windows]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheel-*
          path: dist
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
