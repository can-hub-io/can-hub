# can-hub-web configuration (read by can-hub-web.service).
# After editing:  systemctl restart can-hub-web

# Extra arguments for can-hub-web. Common flags:
#   --connect unix:///run/can-hub/hub.sock   hub admin socket (default)
#   --listen <host:port>                     HTTP bind (default 127.0.0.1:8080)
#   --secure-cookies                         mark the session cookie Secure
#                                            (use behind a TLS reverse proxy)
#
# The panel binds loopback by default. Expose it through a TLS reverse proxy
# (see web/README.md) rather than binding a public address directly.
WEB_ARGS=--listen 127.0.0.1:8080
