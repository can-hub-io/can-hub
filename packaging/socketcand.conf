# can-hub socketcand bridge configuration (read by can-hub-socketcand.service).
# After editing:  systemctl restart can-hub-socketcand

# Extra arguments for the socketcand server. Leave empty for the defaults
# (listen on 127.0.0.1:29536, discovery beacon on). Examples:
#   --listen 0.0.0.0:29536   expose beyond loopback (socketcand clients are unauthenticated; warns)
#   --no-beacon              disable the UDP discovery beacon
SOCKETCAND_ARGS=
