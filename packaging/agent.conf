# can-hub agent configuration (read by can-hub-agent.service).
# After editing:  systemctl enable --now can-hub-agent

# Hub to dial. Scheme is one of quic:// tls:// tcp://
HUB_URL=quic://127.0.0.1:7227

# Agent name: the namespace its interfaces are published under.
# Defaults to this machine's hostname; set it explicitly when running
# more than one agent.
# AGENT_NAME=can-agent

# Extra arguments. Leave empty for none.
AGENT_ARGS=

# SocketCAN interfaces to export, space-separated (e.g. can0 can1).
INTERFACES=can0
