# can-hub configuration (read by can-hub.service).
# After editing:  systemctl restart can-hub

# Listeners, as space-separated --listen flags. Schemes:
#   quic://[<bind-ip>:]<port>   UDP, encrypted (mTLS), default port 7227
#   tls://[<bind-ip>:]<port>    TCP, encrypted (mTLS), default port 7227
#   tcp://[<bind-ip>:]<port>    TCP, plaintext (intranet/MCU), default 127.0.0.1:7228
#   unix://<path>               local wire + admin socket
#
# Default: QUIC on all interfaces + the local unix socket. Examples:
#   add encrypted TCP:    ... --listen tls://0.0.0.0:7227
#   add plaintext TCP:    ... --listen tcp://0.0.0.0:7228
#   move the unix socket: --listen unix:///run/can-hub/hub.sock
HUB_LISTEN_ARGS=--listen quic://0.0.0.0:7227 --listen unix:///run/can-hub/hub.sock
